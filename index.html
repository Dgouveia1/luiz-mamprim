<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Per-page <title>, <meta description>, OG, canonical and JSON-LD are injected per route by <Seo /> via vite-react-ssg's <Head/>. -->
  <meta name="author" content="Dr. Luiz Henrique Mamprin" />

  <!-- Geo / Local (constant for the office) -->
  <meta name="geo.region" content="BR-SP" />
  <meta name="geo.placename" content="Fernandópolis" />
  <meta name="geo.position" content="-20.2839;-50.2466" />
  <meta name="ICBM" content="-20.2839, -50.2466" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/src/public/logo.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script>
    // Clear any stale GH Pages path-preservation flag from older builds.
    try { sessionStorage.removeItem("ghp_redirect"); } catch (e) { /* noop */ }
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
